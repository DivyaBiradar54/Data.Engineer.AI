// Setup Scene, Camera, Renderer
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x030014, 0.002);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 150;
controls.minDistance = 10;

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight(0x00f0ff, 2, 100);
pointLight1.position.set(20, 20, 20);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x7000ff, 2, 100);
pointLight2.position.set(-20, -20, 20);
scene.add(pointLight2);

// Data Particles (Background)
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 2000;
const posArray = new Float32Array(particlesCount * 3);

for(let i = 0; i < particlesCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 200;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particlesMaterial = new THREE.PointsMaterial({
    size: 0.2,
    color: 0x00f0ff,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending
});
const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

// Interactive Nodes
const nodes = [];
const nodeDataMap = new Map();

const createNode = (id, label, position, color, dataKey) => {
    // Node Geometry
    const geometry = new THREE.IcosahedronGeometry(3, 1);
    
    // Core Material
    const material = new THREE.MeshPhysicalMaterial({
        color: color,
        metalness: 0.3,
        roughness: 0.2,
        transmission: 0.9,
        ior: 1.5,
        thickness: 0.5,
        transparent: true,
        opacity: 0.8
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.copy(position);
    mesh.userData = { id, label, dataKey, baseColor: color };
    
    // Glow effect
    const glowGeo = new THREE.IcosahedronGeometry(3.5, 1);
    const glowMat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.1,
        blending: THREE.AdditiveBlending,
        wireframe: true
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    glowMesh.userData = mesh.userData; // Ensure glow mesh has the same data
    mesh.add(glowMesh);

    scene.add(mesh);
    nodes.push(mesh);
    nodeDataMap.set(id, resumeData[dataKey]);

    return mesh;
};

// Create the 4 main nodes
createNode('summary', 'Profile', new THREE.Vector3(-15, 10, 0), 0x00f0ff, 'profile');
createNode('skills', 'Skills', new THREE.Vector3(15, 10, -5), 0x7000ff, 'skills');
createNode('experience', 'Experience', new THREE.Vector3(-10, -10, 5), 0xff00aa, 'experience');
createNode('education', 'Education', new THREE.Vector3(10, -10, -10), 0x00ff88, 'education');

// Raycaster for interactions
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredNode = null;

// UI Elements
const infoPanel = document.getElementById('info-panel');
const infoContent = document.getElementById('info-content');
const closeBtn = document.getElementById('close-btn');
const instructionOverlay = document.getElementById('instruction-overlay');
const startBtn = document.getElementById('start-btn');

startBtn.addEventListener('click', () => {
    instructionOverlay.classList.add('hidden');
});

closeBtn.addEventListener('click', () => {
    infoPanel.classList.add('hidden');
});

// Mouse Move Event
window.addEventListener('mousemove', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodes, false);

    if (intersects.length > 0) {
        document.body.style.cursor = 'pointer';
        if (hoveredNode !== intersects[0].object) {
            if (hoveredNode) hoveredNode.scale.set(1, 1, 1);
            hoveredNode = intersects[0].object;
            hoveredNode.scale.set(1.2, 1.2, 1.2);
        }
    } else {
        document.body.style.cursor = 'default';
        if (hoveredNode) {
            hoveredNode.scale.set(1, 1, 1);
            hoveredNode = null;
        }
    }
});

// Click Event
window.addEventListener('click', () => {
    if (hoveredNode) {
        // Animate camera to node
        const targetPos = hoveredNode.position.clone();
        targetPos.z += 20;
        
        // Very basic camera lerp simulation for focus (can be enhanced with GSAP)
        const currentPos = camera.position.clone();
        const dist = currentPos.distanceTo(targetPos);
        
        // Populate UI
        const dataKey = hoveredNode.userData.dataKey;
        const data = resumeData[dataKey];
        renderContent(dataKey, data);
        
        infoPanel.classList.remove('hidden');
    }
});

function renderContent(key, data) {
    let html = '';
    
    if (key === 'profile') {
        html = `<h2>${data.title}</h2>
                <p>${data.content}</p>
                <p style="color: var(--primary-color); margin-top: 1rem;">${data.contact}</p>`;
    } else if (key === 'skills' || key === 'education') {
        html = `<h2>${data.title}</h2>${data.content}`;
    } else if (key === 'experience') {
        html = `<h2>Experience</h2>`;
        data.forEach(exp => {
            html += `
                <div class="exp-item">
                    <div class="exp-role">${exp.role} @ ${exp.company}</div>
                    <div class="exp-meta">${exp.duration} ${exp.location ? '| ' + exp.location : ''}</div>
                    <ul>
                        ${exp.points.map(p => `<li>${p}</li>`).join('')}
                    </ul>
                </div>
            `;
        });
    } else {
        html = `<h2>Error</h2><p>Unknown key: ${key}</p>`;
    }
    
    if (!html || html === '') {
        html = `<h2>Fallback</h2><p>Data was empty. Key: ${key}</p><pre>${JSON.stringify(data)}</pre>`;
    }
    
    infoContent.innerHTML = html;
}

// Window Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation Loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const elapsedTime = clock.getElapsedTime();

    // Rotate particles
    particlesMesh.rotation.y = elapsedTime * 0.05;
    particlesMesh.rotation.x = elapsedTime * 0.02;

    // Animate nodes
    nodes.forEach((node, index) => {
        node.rotation.x += 0.01;
        node.rotation.y += 0.01;
        
        // Floating effect
        const offset = index * Math.PI / 2;
        node.position.y += Math.sin(elapsedTime * 2 + offset) * 0.02;
    });

    controls.update();
    renderer.render(scene, camera);
}

animate();

</script>
